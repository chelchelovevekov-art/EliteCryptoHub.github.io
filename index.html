<!DOCTYPE html>
<html lang="ru">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #050505;
            --duel: #8e14d9;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --live: #00ff41;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 40%, rgba(142, 20, 217, 0.15) 0%, transparent 60%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 60px 0; /* Убрали боковые паддинги для body, перенесли в секции */
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .top-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .main-logo {
            height: 220px; 
            width: 220px;
            object-fit: contain;
            filter: drop-shadow(0 0 25px rgba(142, 20, 217, 0.3));
            transition: all 0.4s ease;
        }

        .main-logo:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 40px rgba(142, 20, 217, 0.5));
        }

        h1 {
            font-weight: 900;
            font-size: 3.5rem;
            letter-spacing: -1px;
            margin: 0 0 15px 0;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-align: center;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #aaa;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
            font-weight: 400;
            text-align: center;
        }

        /* --- НОВАЯ ФИЧА: LIVE СТАТУС --- */
        .live-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--live);
            margin-top: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background-color: var(--live);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--live);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 65, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); }
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            padding: 0 20px;
            box-sizing: border-box;
            margin-top: 20px !important;
        }

        .card {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }
