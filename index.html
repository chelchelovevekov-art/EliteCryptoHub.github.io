<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100RTP | The Transparent Platform</title>
    
    <link rel="icon" href="100rtpflav.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #050505;
            --duel: #8e14d9;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 40%, rgba(142, 20, 217, 0.15) 0%, transparent 60%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 60px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
        }

        .top-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .main-logo {
            height: 220px; 
            width: 220px;
            object-fit: contain;
            filter: drop-shadow(0 0 25px rgba(142, 20, 217, 0.3));
            transition: all 0.4s ease;
        }

        .main-logo:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 40px rgba(142, 20, 217, 0.5));
        }

        h1 {
            font-weight: 900;
            font-size: 3.5rem;
            letter-spacing: -1px;
            margin: 0 0 15px 0;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-align: center;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #aaa;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
            font-weight: 400;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            margin-top: 40px !important;
        }

        .card {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(142, 20, 217, 0.4);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .card h2 {
            font-size: 2.5rem;
            margin: 0 0 30px 0;
            font-weight: 900;
            color: var(--duel);
            text-shadow: 0 0 25px rgba(142, 20, 217, 0.4);
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0 0 40px 0;
            text-align: left;
            width: 100%; 
        }

        li {
            font-size: 1.2rem;
            margin-bottom: 20px; 
            display: flex;
            align-items: center;
            gap: 15px;
            color: #eee; 
        }

        li i { 
            font-size: 1rem; 
            color: var(--duel);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 22px 0;
            border-radius: 18px;
            text-decoration: none;
            text-align: center;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background: var(--duel);
            color: #fff;
            box-shadow: 0 10px 25px rgba(142, 20, 217, 0.3);
        }

        .btn:hover { 
            filter: brightness(1.2); 
            transform: scale(1.02);
            box-shadow: 0 15px 35px rgba(142, 20, 217, 0.5);
        }

        footer {
            margin-top: auto;
            padding: 60px 0;
            font-size: 0.8rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        @media (max-width: 600px) {
            .main-logo { height: 160px; width: 160px; }
            h1 { font-size: 2.2rem; }
            .subtitle { font-size: 1rem; padding: 0 10px; }
            .card { padding: 30px 20px; }
            li { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="top-logos">
            <a href="https://duel.com/r/topgwin" target="_blank" rel="noopener noreferrer">
                <img src="image-Photoroom (30).png" alt="Duel" class="main-logo">
            </a>
        </div>
        <h1>100RTP HUB</h1>
        <p class="subtitle">Math over luck. We expose the 94% traps and play where the data is fully transparent.</p>
    </div>

    <div class="container">
        <div class="card duel">
            <h2>DUEL</h2>
            <ul>
                <li><i class="fas fa-bolt"></i> <b>100% RTP</b> Originals</li>
                <li><i class="fas fa-chart-line"></i> <b>Live High Scores</b> & Stats</li>
                <li><i class="fas fa-wallet"></i> <b>Instant</b> Crypto Cashouts</li>
                <li><i class="fas fa-mask"></i> <b>No KYC</b> Required</li>
            </ul>
            <a href="https://duel.com/r/topgwin" target="_blank" rel="noopener noreferrer" class="btn">ENTER DUEL</a>
        </div>
    </div>

    <footer>100RTPHUB.TOP — HIGH STAKES AUTHORITY</footer>

</body>
</html>
